<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Shavil Accessories</title>

<link
rel="preconnect"
href="https://fonts.googleapis.com">

<link
rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<link
rel="stylesheet"
href="product.css">

</head>

<body>

<header class="header">

<div class="container">

<a
href="showroom.html"
class="logo">

SHAVIL ACCESSORIES

</a>

<a
id="topWhatsapp"
class="btn whatsapp"
target="_blank">

WhatsApp

</a>

</div>

</header>

<div class="container">

<div class="breadcrumb">

<a href="showroom.html">

Home

</a>

/

<span id="breadcrumbCategory">

Category

</span>

/

<strong id="breadcrumbProduct">

Loading...

</strong>

</div>

<div class="product-layout">

<div class="gallery-side">

<div class="main-image-wrapper">

<img
id="mainImage"
class="main-image">

<button
class="gallery-btn prev"
onclick="previousImage()">

❮

</button>

<button
class="gallery-btn next"
onclick="nextImage()">

❯

</button>

</div>

<div
id="galleryRow"
class="gallery-row">

</div>

<div
id="videoContainer">

</div>

</div>

<div class="info-side">

<div
id="productTags">

</div>

<h1
id="productName">

Loading...

</h1>

<div
id="productPrice"
class="price">

</div>

<div
id="stockStatus">

</div>

<p
id="productDescription">

</p>

<div
id="infoCards"
class="info-grid">

</div>

<div class="actions">

<a
id="whatsappBtn"
class="btn whatsapp"
target="_blank">

Order via WhatsApp

</a>

<button
id="inquiryBtn"
class="btn primary">

Send Inquiry

</button>

</div>

</div>

</div>

<section class="description-section">

<h2>

Description

</h2>

<div
id="longDescription">

</div>

</section>

<section class="related-section">

<h2>

Related Products

</h2>

<div
id="relatedGrid"
class="related-grid">

</div>

</section>

</div>

<footer>

Shavil Accessories © 2026

</footer>

<script src="product.js"></script>

</body>

</html>
