<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Shavil Accessories</title>

<link
rel="preconnect"
href="https://fonts.googleapis.com">

<link
rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  :root{
--bg:#f4f6f9;
--card:#ffffff;
--text:#111827;
--muted:#6b7280;
--border:#e5e7eb;
--primary:#111827;
--blue:#2563eb;
--green:#16a34a;
--danger:#dc2626;
--radius:20px;
--shadow:0 18px 45px rgba(15,23,42,.08);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{
font-family:"Inter",sans-serif;
background:var(--bg);
color:var(--text);
line-height:1.6;
}

img{
display:block;
max-width:100%;
}

a{
text-decoration:none;
color:inherit;
}

.container{
width:min(1200px,calc(100% - 30px));
margin:auto;
}

.header{
position:sticky;
top:0;
z-index:999;
background:#111827;
color:#fff;
box-shadow:0 8px 30px rgba(0,0,0,.15);
}

.header .container{
height:78px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:22px;
font-weight:900;
letter-spacing:.08em;
}

.btn{
border:none;
cursor:pointer;
padding:14px 24px;
border-radius:14px;
font-size:15px;
font-weight:700;
display:inline-flex;
align-items:center;
justify-content:center;
transition:.25s;
}

.btn:hover{
transform:translateY(-2px);
}

.whatsapp{
background:#16a34a;
color:#fff;
}

.whatsapp:hover{
background:#15803d;
}

.primary{
background:#111827;
color:#fff;
}

.primary:hover{
background:#000;
}

.breadcrumb{
padding:30px 0;
display:flex;
gap:10px;
flex-wrap:wrap;
font-size:14px;
color:#6b7280;
}

.breadcrumb a{
color:#2563eb;
font-weight:700;
}

.product-layout{
display:grid;
grid-template-columns:1.08fr .92fr;
gap:45px;
align-items:start;
padding-bottom:70px;
}

.gallery-side{
position:sticky;
top:100px;
}

.main-image-wrapper{
position:relative;
overflow:hidden;
border-radius:20px;
background:#fff;
box-shadow:var(--shadow);
}

.main-image{
width:100%;
height:650px;
object-fit:cover;
cursor:zoom-in;
transition:.3s;
}

.gallery-btn{
position:absolute;
top:50%;
transform:translateY(-50%);
width:48px;
height:48px;
border:none;
border-radius:50%;
background:rgba(255,255,255,.92);
cursor:pointer;
font-size:22px;
font-weight:900;
box-shadow:0 5px 18px rgba(0,0,0,.15);
}

.prev{
left:15px;
}

.next{
right:15px;
}

.gallery-row{
display:flex;
gap:12px;
flex-wrap:wrap;
margin-top:16px;
}

.gallery-thumb{
width:90px;
height:90px;
border-radius:12px;
object-fit:cover;
cursor:pointer;
border:3px solid transparent;
opacity:.65;
transition:.3s;
}

.gallery-thumb:hover{
opacity:1;
}

.active-thumb{
border-color:#2563eb;
opacity:1;
}

#videoContainer{
margin-top:18px;
}

#videoContainer video{
width:100%;
border-radius:16px;
}

.info-side{
display:flex;
flex-direction:column;
gap:18px;
}

#productTags{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.tag{
background:#eff6ff;
color:#2563eb;
padding:8px 14px;
border-radius:50px;
font-size:13px;
font-weight:700;
}

.tag.featured{
background:#111827;
color:#fff;
}

#productName{
font-size:42px;
font-weight:900;
line-height:1.1;
}

.price{
font-size:36px;
font-weight:900;
color:#2563eb;
}

#stockStatus{
font-size:17px;
font-weight:700;
}

.stock-in{
color:#16a34a;
}

.stock-out{
color:#dc2626;
}

#productDescription{
font-size:16px;
color:#4b5563;
line-height:1.9;
}

.info-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:16px;
margin-top:10px;
}

.info-card{
background:#fff;
border:1px solid var(--border);
border-radius:16px;
padding:18px;
box-shadow:var(--shadow);
}

.info-card span{
display:block;
font-size:13px;
color:#6b7280;
margin-bottom:8px;
}

.info-card strong{
font-size:18px;
}

.actions{
display:flex;
gap:15px;
flex-wrap:wrap;
margin-top:15px;
}

.actions .btn{
flex:1;
}

.description-section{
margin:40px 0 70px;
}

.description-section h2{
font-size:34px;
margin-bottom:18px;
}

#longDescription{
background:#fff;
padding:28px;
border-radius:20px;
border:1px solid var(--border);
box-shadow:var(--shadow);
line-height:1.9;
color:#4b5563;
}

.related-section{
margin-bottom:70px;
}

.related-section h2{
font-size:34px;
margin-bottom:22px;
}

.related-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.related-card{
background:#fff;
border-radius:20px;
overflow:hidden;
border:1px solid var(--border);
box-shadow:var(--shadow);
cursor:pointer;
transition:.3s;
}

.related-card:hover{
transform:translateY(-6px);
}

.related-card img{
width:100%;
height:220px;
object-fit:cover;
}

.related-body{
padding:18px;
}

.related-body h3{
font-size:18px;
margin-bottom:10px;
}

.related-body p{
font-weight:800;
color:#2563eb;
}

footer{
background:#111827;
color:#fff;
padding:35px;
text-align:center;
margin-top:60px;
}

@media(max-width:980px){

.product-layout{
grid-template-columns:1fr;
}

.gallery-side{
position:static;
}

.main-image{
height:420px;
}

.info-grid{
grid-template-columns:1fr;
}

#productName{
font-size:32px;
}

}

@media(max-width:640px){

.container{
width:calc(100% - 20px);
}

.header .container{
height:70px;
}

.logo{
font-size:18px;
}

.btn{
padding:12px 16px;
font-size:14px;
}

.main-image{
height:320px;
}

.gallery-thumb{
width:70px;
height:70px;
}

.price{
font-size:28px;
}

.description-section h2,
.related-section h2{
font-size:28px;
}

.actions{
flex-direction:column;
}

.actions .btn{
width:100%;
}

}
</style>
</head>

<body>

<header class="header">

<div class="container">

<a
href="showroom.html"
class="logo">

SHAVIL ACCESSORIES

</a>

<a
id="topWhatsapp"
class="btn whatsapp"
target="_blank">

WhatsApp

</a>

</div>

</header>

<div class="container">

<div class="breadcrumb">

<a href="showroom.html">

Home

</a>

/

<span id="breadcrumbCategory">

Category

</span>

/

<strong id="breadcrumbProduct">

Loading...

</strong>

</div>

<div class="product-layout">

<div class="gallery-side">

<div class="main-image-wrapper">

<img
id="mainImage"
class="main-image">

<button
class="gallery-btn prev"
onclick="previousImage()">

❮

</button>

<button
class="gallery-btn next"
onclick="nextImage()">

❯

</button>

</div>

<div
id="galleryRow"
class="gallery-row">

</div>

<div
id="videoContainer">

</div>

</div>

<div class="info-side">

<div
id="productTags">

</div>

<h1
id="productName">

Loading...

</h1>

<div
id="productPrice"
class="price">

</div>

<div
id="stockStatus">

</div>

<p
id="productDescription">

</p>

<div
id="infoCards"
class="info-grid">

</div>

<div class="actions">

<a
id="whatsappBtn"
class="btn whatsapp"
target="_blank">

Order via WhatsApp

</a>

<button
id="inquiryBtn"
class="btn primary">

Send Inquiry

</button>

</div>

</div>

</div>

<section class="description-section">

<h2>

Description

</h2>

<div
id="longDescription">

</div>

</section>

<section class="related-section">

<h2>

Related Products

</h2>

<div
id="relatedGrid"
class="related-grid">

</div>

</section>

</div>

<footer>

Shavil Accessories © 2026

</footer>

<script>

const SUPABASE_URL="https://fpkpjbnlnthpaqvegmxg.supabase.co";
const SUPABASE_KEY="sb_publishable_7GJ84yyjaj7Jcmr7XroYLA_t5Fxf70a";

const BUSINESS_PHONE="255676998549";

const supabaseClient=supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

const params=new URLSearchParams(window.location.search);

const slug=params.get("slug");

let product=null;
let media=[];
let currentImage=0;

function money(v){

return new Intl.NumberFormat("en-TZ",{

style:"currency",

currency:"TZS",

maximumFractionDigits:0

}).format(Number(v||0));

}

async function loadProduct(){

const {data,error}=await supabaseClient

.from("products")

.select("*")

.eq("slug",slug)

.single();

if(error){

console.log(error);

document.getElementById("productName").innerHTML="Product Not Found";

return;

}

product=data;

loadMedia();

}

async function loadMedia(){

const {data}=await supabaseClient

.from("product_media")

.select("*")

.eq("product_id",product.id)

.order("sort_order",{ascending:true});

media=data||[];

renderProduct();

}

function renderProduct(){

document.title=product.name;

document.getElementById("breadcrumbCategory").textContent=

product.category||"Accessories";

document.getElementById("breadcrumbProduct").textContent=

product.name;

document.getElementById("productName").textContent=

product.name;

document.getElementById("productPrice").textContent=

money(product.selling_price);

document.getElementById("productDescription").textContent=

product.short_description||"";

document.getElementById("longDescription").textContent=

product.long_description||

product.short_description||

"";

document.getElementById("stockStatus").innerHTML=

product.stock_qty>0

?'<span class="stock-in">🟢 In Stock</span>'

:'<span class="stock-out">🔴 Out of Stock</span>';

document.getElementById("infoCards").innerHTML=`

<div class="info-card">

<span>Category</span>

<strong>${product.category||"-"}</strong>

</div>

<div class="info-card">

<span>Stock</span>

<strong>${product.stock_qty}</strong>

</div>

<div class="info-card">

<span>Product ID</span>

<strong>#${product.id}</strong>

</div>

<div class="info-card">

<span>Status</span>

<strong>${product.stock_qty>0?"Available":"Out of Stock"}</strong>

</div>

`;

document.getElementById("productTags").innerHTML=`

<span class="tag">

${product.category||"Accessories"}

</span>

${product.is_featured?

'<span class="tag featured">Featured</span>'

:""}

`;

document.getElementById("whatsappBtn").href=

`https://wa.me/${BUSINESS_PHONE}?text=${encodeURIComponent("Hello, I want "+product.name)}`;

document.getElementById("topWhatsapp").href=

document.getElementById("whatsappBtn").href;

renderGallery();

loadRelated();

}
function renderGallery(){

const main=document.getElementById("mainImage");

const row=document.getElementById("galleryRow");

row.innerHTML="";

if(media.length===0){

main.src=

product.thumbnail_url||

"https://placehold.co/900x900?text=No+Image";

return;

}

currentImage=0;

console.log(media);

main.src = media[0]?.media_url || product.thumbnail_url || "";

media.forEach((item,index)=>{

if(item.media_type!=="image") return;

row.innerHTML+=`

<img

src="${item.media_url}"

class="gallery-thumb ${index===0?'active-thumb':''}"

onclick="changeImage(${index})">

`;

});

const video=media.find(x=>x.media_type==="video");

if(video){

document.getElementById("videoContainer").innerHTML=`

<video

controls

playsinline

preload="metadata">

<source

src="${video.media_url}">

</video>

`;

}

}

function changeImage(index){

currentImage=index;

document.getElementById("mainImage").src=

media[index].media_url;

document

.querySelectorAll(".gallery-thumb")

.forEach((img,i)=>{

img.classList.toggle(

"active-thumb",

i===index

);

});

}

function previousImage(){

if(media.length===0) return;

currentImage--;

if(currentImage<0)

currentImage=media.length-1;

changeImage(currentImage);

}

function nextImage(){

if(media.length===0) return;

currentImage++;

if(currentImage>=media.length)

currentImage=0;

changeImage(currentImage);

}

async function loadRelated(){

const {data}=await supabaseClient

.from("products")

.select("*")

.eq("category",product.category)

.neq("id",product.id)

.limit(4);

const grid=document.getElementById("relatedGrid");

grid.innerHTML="";

(data||[]).forEach(item=>{

grid.innerHTML+=`

<div

class="related-card"

onclick="location.href='product.html?slug=${item.slug}'">

<img

src="${item.thumbnail_url||

'https://placehold.co/400'}">

<div class="related-body">

<h3>

${item.name}

</h3>

<p>

${money(item.selling_price)}

</p>

</div>

</div>

`;

});

}

document

.getElementById("inquiryBtn")

.onclick=function(){

location.href=

`showroom.html?product=${product.id}#inquiry`;

};

loadProduct();

</script>

</body>

</html>
